namespace: indigopay

backend:
  image: indigopay/backend:latest
  replicas: 2
  port: 4000
  serviceMonitor:
    enabled: false
  shutdownTimeoutMs: 30000
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

frontend:
  image: indigopay/frontend:latest
  replicas: 2
  port: 3000

postgres:
  image: postgres:16-alpine
  storage: 5Gi

config:
  stellarNetwork: testnet
  horizonUrl: https://horizon-testnet.stellar.org
  sorobanRpcUrl: https://soroban-testnet.stellar.org
  contractId: ""
  usdcIssuer: ""
  emailFrom: "IndigoPay <updates@yourdomain.com>"

secrets:
  postgresUser: postgres
  postgresPassword: changeme
  postgresDb: indigopay
  resendApiKey: ""
  adminApiKey: ""
  metricsBearerToken: ""

ingress:
  host: indigopay.local
  className: nginx
